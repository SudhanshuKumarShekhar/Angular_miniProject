<div class="min-h-screen bg-gradient-to-br form-gray-900 to-gray-800 text-white flex items-center justify-center">
  <div class="w-full max-w-md bg-gray-800 p-6 rounded-2xl shadow-lg space-y-4">
    <h2 class="text-2xl font-bold text-center">GitHub User Search</h2>
    <div class="flex gap-2">
    <input type="text" placeholder="Enter username...."
    class="flex-1 p-2 rounded bg-gray-700 outline-none"
    (input)="query.set($any($event.target).value)">

    <button class="bg-blue-500 px-4 rounded hover:bg-blue-600" (click)="searchUser()">
      Search
    </button>
    </div>
    @if (loading()) {
      <p class="text-center text-gray-400">Loading...</p>
    }
    @if (error()) {
      <p class="text-center text-red-500">{{ error() }}</p>
    }

    @if(user()){
      <div class="bg-gray-700 p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition transform">
        <img [src]="user().avatar_url" alt="" class="w-20 h-20 rounded-full mx-auto mb-2 border-2 border-white">
        <h2 class="text-lg font-semibold">{{ user().login || user().name }}</h2>
        <p class="text-sm text-gray-300">{{ user().bio || 'No bio available' }}</p>
        <p class="text-xs text-gray-400 mt-2" (click)="openProfile()">Click to view profile --> </p>
      </div>
    }
  </div>
</div>
