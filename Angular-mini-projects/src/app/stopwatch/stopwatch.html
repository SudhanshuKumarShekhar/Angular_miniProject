<div class="text-center mt-5 mb-5">
  <h1 class="text-2xl font-bold mb-4">Stopwatch</h1>
  <h1 class="text-4xl font-bold">{{time()}}s</h1>

  <div class="mt-4 flex justify-center gap-3">
    <button class="bg-green-500 px-4 py-2 text-white" (click)="start()">Start</button>
    <button class="bg-yellow-500 px-4 py-2 text-white" (click)="stop()">Stop</button>
    <button class="bg-red-500 px-4 py-2 text-white" (click)="reset()">Reset</button>
  </div>
</div>
